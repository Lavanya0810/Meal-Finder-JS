<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Document</title>




  <link rel="stylesheet" href="style.css">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

  <!-- Navbar -->

  <nav>

    <div class="logo">
      <i class="fa-solid fa-utensils"></i>
      <span>MEAL FINDER</span>
    </div>

    <div class="menu">
      <i class="fa-solid fa-bars"></i>
    </div>

  </nav>


  <!-- Hero Section -->

  <section class="hero">

    <div class="overlay">

      <div class="search-box">

        <input type="text" id="searchInput" placeholder="Search Recipes Here">

        <button id="searchBtn">
          <i class="fa-solid fa-magnifying-glass"></i>
        </button>

      </div>

      <h1>What are your favorite cuisines?</h1>

      <p>PERSONALIZE YOUR EXPERIENCE</p>

    </div>

  </section>


  <!-- Categories -->

  <section class="categories">

    <h2>CATEGORIES</h2>

    <div id="categoryContainer" class="cards">

    </div>

  </section>


  <!-- Search Result -->

  <section>

    <div id="mealContainer" class="cards">

    </div>

  </section>


  <!-- Popup -->

  <div id="popup" class="popup">

    <div class="popup-content">

      <span id="close">&times;</span>

      <div id="mealDetails"></div>

    </div>

  </div>

  <script src="script.js"></script>

</body>

</html>

</body>

</html>
